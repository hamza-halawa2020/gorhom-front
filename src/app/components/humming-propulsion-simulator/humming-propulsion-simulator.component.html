<!-- Hummingbird Propulsion Simulator Section -->
<section class="py-20 bg-black relative overflow-hidden">
  <div class="absolute inset-0">
    <div
      class="absolute inset-0 bg-gradient-to-b from-black/90 via-black/80 to-black/90"
    ></div>
    <div class="absolute inset-0 grid-pattern"></div>
  </div>

  <div class="container mx-auto px-4 relative z-10">
    <!-- Header -->
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">
        {{ "hps_mechanism_title" | translate }}
      </h2>
      <div class="w-20 h-1 bg-sky-500 mx-auto"></div>
    </div>

    <!-- Stage -->
    <div class="tech-card p-4 sm:p-6 lg:p-8 rounded-xl overflow-hidden">
      <!-- Controls -->
      <div
        class="flex flex-col sm:flex-row items-center justify-center gap-6 sm:gap-4 lg:gap-6 mb-8"
      >
        <div
          class="flex flex-col sm:flex-row items-center gap-2 sm:gap-3 lg:gap-4"
        >
          <span
            class="text-slate-300 font-medium text-sm sm:text-base text-center sm:text-left whitespace-nowrap"
            >{{ "thrust_direction" | translate }}</span
          >
          <div
            class="flex items-center gap-2 sm:gap-3 [dir='rtl']:flex-row-reverse"
          >
            <input
              type="range"
              min="-180"
              max="180"
              [value]="directionDeg"
              (input)="onDirectionChange($event)"
              class="w-20 sm:w-24 lg:w-28"
            />
            <span
              class="text-slate-400 text-sm w-10 sm:w-12 text-right [dir='rtl']:text-left"
              >{{ directionDeg }}°</span
            >
          </div>
        </div>

        <div
          class="flex flex-col sm:flex-row items-center gap-2 sm:gap-3 lg:gap-4"
        >
          <span
            class="text-slate-300 font-medium text-sm sm:text-base text-center sm:text-left whitespace-nowrap"
            >{{ "speed" | translate }}</span
          >
          <div
            class="flex items-center gap-2 sm:gap-3 [dir='rtl']:flex-row-reverse"
          >
            <input
              type="range"
              min="0"
              max="50"
              [value]="rpm"
              (input)="onRpmChange($event)"
              class="w-20 sm:w-24 lg:w-28"
            />
            <span
              class="text-slate-400 text-sm w-8 sm:w-10 text-right [dir='rtl']:text-left"
              >{{ rpm }}</span
            >
          </div>
        </div>

        <button
          class="btn text-sm sm:text-base px-3 sm:px-4 lg:px-6 py-2 sm:py-2.5"
          (click)="togglePlaying()"
        >
          {{ playing ? ("pause" | translate) : ("play" | translate) }}
        </button>
      </div>
      <svg
        viewBox="-900 -420 1800 840"
        class="w-full h-64 sm:h-80 md:h-96 lg:h-[640px]"
      >
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8FD3FE" />
            <stop offset="100%" stop-color="#1C6DD0" />
          </linearGradient>
          <filter id="mblur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.2" />
          </filter>
          <!-- Compass arrowheads -->
          <marker
            id="arrowMotion"
            markerWidth="10"
            markerHeight="10"
            refX="6"
            refY="3"
            orient="auto"
            markerUnits="strokeWidth"
          >
            <path d="M0,0 L0,6 L9,3 z" fill="#22c55e" />
          </marker>
          <marker
            id="arrowThrust"
            markerWidth="10"
            markerHeight="10"
            refX="6"
            refY="3"
            orient="auto"
            markerUnits="strokeWidth"
          >
            <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
          </marker>
          <!-- Thrust gradient & blur -->
          <linearGradient id="thrustGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
            <stop offset="45%" stop-color="#BFE9FF" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#8FD3FE" stop-opacity="0" />
          </linearGradient>
          <filter id="thrustBlur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.6" />
          </filter>
        </defs>

        <!-- Sky -->
        <rect x="-1800" y="-840" width="3600" height="1680" fill="url(#sky)" />

        <!-- Clouds -->
        <g opacity="0.25" filter="url(#mblur)">
          <ng-container *ngFor="let seed of cloudSeeds; let i = index">
            <g
              [attr.transform]="
                'translate(' +
                (((seed.x + cloud2.x + 1800) % 3600) - 1800) +
                ', ' +
                (((seed.y + cloud2.y + 840) % 1680) - 840) +
                ') scale(1.5)'
              "
            >
              <path
                d="M -90 0 C -110 -10, -80 -40, -40 -30 C -20 -70, 40 -70, 60 -30 C 100 -40, 120 -10, 90 0 C 110 20, 80 40, 30 35 C 0 60, -60 50, -70 25 C -100 30, -110 10, -90 0 Z"
                fill="#ffffff"
                fill-opacity="0.9"
              />
            </g>
          </ng-container>
        </g>

        <g opacity="0.35" filter="url(#mblur)">
          <ng-container *ngFor="let seed of cloudSeeds; let i = index">
            <g
              [attr.transform]="
                'translate(' +
                (((seed.x + cloud1.x + 1800) % 3600) - 1800) +
                ', ' +
                (((seed.y + cloud1.y + 840) % 1680) - 840) +
                ') scale(2.0)'
              "
            >
              <path
                d="M -90 0 C -110 -10, -80 -40, -40 -30 C -20 -70, 40 -70, 60 -30 C 100 -40, 120 -10, 90 0 C 110 20, 80 40, 30 35 C 0 60, -60 50, -70 25 C -100 30, -110 10, -90 0 Z"
                fill="#ffffff"
                fill-opacity="0.9"
              />
            </g>
          </ng-container>
        </g>

        <!-- Craft body — fixed -->
        <g>
          <path
            d="M -720 0 C -520 -180, 520 -180, 720 0 C 540 120, -540 120, -720 0 Z"
            [attr.fill]="theme.craftBody"
            [attr.stroke]="theme.craftBodyEdge"
            stroke-width="2"
          />
          <path
            d="M -680 60 C -520 120, 520 120, 680 60 L 640 100 C 480 140, -480 140, -640 100 Z"
            fill="#0B0D11"
            [attr.stroke]="theme.craftBodyEdge"
            stroke-width="2"
          />
          <rect
            x="-260"
            y="40"
            width="520"
            height="16"
            rx="8"
            [attr.fill]="theme.window"
          />
          <path
            d="M -760 10 L -600 10 L -560 60 L -620 110 L -760 90 Z"
            fill="#0B0D11"
            [attr.stroke]="theme.craftBodyEdge"
            stroke-width="2"
          />
          <path
            d="M 760 10 L 600 10 L 560 60 L 620 110 L 760 90 Z"
            fill="#0B0D11"
            [attr.stroke]="theme.craftBodyEdge"
            stroke-width="2"
          />
        </g>

        <!-- Compass (motion vs thrust) -->
        <g transform="translate(0, -260)">
          <circle
            cx="0"
            cy="0"
            r="70"
            fill="#0a1424"
            fill-opacity="0.35"
            stroke="#19324f"
            stroke-width="1"
          />
          <line
            x1="-60"
            y1="0"
            x2="60"
            y2="0"
            stroke="#1c2f46"
            stroke-width="1"
          />
          <line
            x1="0"
            y1="-60"
            x2="0"
            y2="60"
            stroke="#1c2f46"
            stroke-width="1"
          />
          <line
            x1="0"
            y1="0"
            [attr.x2]="angleToPoint(56, directionDeg).x"
            [attr.y2]="angleToPoint(56, directionDeg).y"
            stroke="#22c55e"
            stroke-width="4"
            marker-end="url(#arrowMotion)"
          />
          <line
            x1="0"
            y1="0"
            [attr.x2]="angleToPoint(56, (directionDeg + 180) % 360).x"
            [attr.y2]="angleToPoint(56, (directionDeg + 180) % 360).y"
            stroke="#f59e0b"
            stroke-width="3"
            marker-end="url(#arrowThrust)"
          />
          <g transform="translate(0, 92)">
            <circle r="5" fill="#22c55e" />
            <text
              x="0"
              y="20"
              font-size="20"
              fill="#e7f6ff"
              text-anchor="middle"
            >
              {{ "motion" | translate }}
            </text>
            <g transform="translate(70,0)">
              <circle r="5" fill="#f59e0b" />
              <text
                x="0"
                y="20"
                font-size="20"
                fill="#e7f6ff"
                text-anchor="middle"
              >
                {{ "thrust" | translate }}
              </text>
            </g>
          </g>
        </g>

        <!-- Thrust flow from each system (gradient, transparent) -->
        <g opacity="0.38">
          <g
            [attr.transform]="
              'translate(-610, 55) rotate(' + ((directionDeg + 180) % 360) + ')'
            "
            filter="url(#thrustBlur)"
          >
            <rect
              [attr.x]="-(R * 1.1) / 2"
              [attr.y]="-(80 + (rpm - 1) * (240 / 59))"
              [attr.width]="R * 1.1"
              [attr.height]="80 + (rpm - 1) * (240 / 59)"
              [attr.rx]="R * 0.22"
              fill="url(#thrustGrad)"
            />
          </g>
          <g
            [attr.transform]="
              'translate(610, 55) rotate(' + ((directionDeg + 180) % 360) + ')'
            "
            filter="url(#thrustBlur)"
          >
            <rect
              [attr.x]="-(R * 1.1) / 2"
              [attr.y]="-(80 + (rpm - 1) * (240 / 59))"
              [attr.width]="R * 1.1"
              [attr.height]="80 + (rpm - 1) * (240 / 59)"
              [attr.rx]="R * 0.22"
              fill="url(#thrustGrad)"
            />
          </g>
        </g>

        <!-- Twin systems (each rotates by directionDeg about its center) -->
        <g transform="translate(-610, 55)">
          <g [attr.transform]="'rotate(' + directionDeg + ')'">
            <!-- ring + ticks -->
            <circle
              cx="0"
              cy="0"
              [attr.r]="R"
              fill="none"
              [attr.stroke]="theme.ring"
              stroke-width="2"
            />
            <ng-container
              *ngFor="let tick of [].constructor(36); let i = index"
            >
              <ng-container *ngIf="(i * 10) % 30 === 0; else minorTick">
                <line
                  [attr.x1]="angleToPoint(R - 10, i * 10).x"
                  [attr.y1]="angleToPoint(R - 10, i * 10).y"
                  [attr.x2]="angleToPoint(R, i * 10).x"
                  [attr.y2]="angleToPoint(R, i * 10).y"
                  [attr.stroke]="theme.tickMajor"
                  stroke-width="2"
                />
              </ng-container>
              <ng-template #minorTick>
                <line
                  [attr.x1]="angleToPoint(R - 6, i * 10).x"
                  [attr.y1]="angleToPoint(R - 6, i * 10).y"
                  [attr.x2]="angleToPoint(R, i * 10).x"
                  [attr.y2]="angleToPoint(R, i * 10).y"
                  [attr.stroke]="theme.tickMinor"
                  stroke-width="1"
                />
              </ng-template>
            </ng-container>

            <!-- arms + wings -->
            <ng-container *ngFor="let unit of units">
              <g>
                <g
                  [attr.transform]="
                    'rotate(' + ((currentTheta + unit.offset + 360) % 360) + ')'
                  "
                >
                  <line
                    x1="0"
                    y1="0"
                    x2="0"
                    [attr.y2]="-ARM_LEN"
                    [attr.stroke]="theme.arm"
                    stroke-width="5"
                    stroke-linecap="round"
                  />
                  <circle
                    *ngIf="unit.id === 0"
                    cx="0"
                    cy="0"
                    r="7"
                    [attr.fill]="theme.hub"
                  />
                  <circle
                    cx="0"
                    [attr.cy]="-ARM_LEN"
                    r="5"
                    [attr.fill]="theme.tip"
                  />
                </g>
                <g
                  [attr.transform]="
                    'translate(' +
                    angleToPoint(
                      ARM_LEN,
                      (currentTheta + unit.offset + 360) % 360
                    ).x +
                    ', ' +
                    angleToPoint(
                      ARM_LEN,
                      (currentTheta + unit.offset + 360) % 360
                    ).y +
                    ') rotate(' +
                    calculateWingAngle(
                      (currentTheta + unit.offset + 360) % 360
                    ) +
                    ')'
                  "
                >
                  <line
                    x1="0"
                    y1="0"
                    x2="0"
                    [attr.y2]="-WING_LEN"
                    [attr.stroke]="theme.wing"
                    stroke-width="8"
                    stroke-linecap="round"
                  />
                </g>
              </g>
            </ng-container>
          </g>
        </g>

        <g transform="translate(610, 55)">
          <g [attr.transform]="'rotate(' + directionDeg + ')'">
            <!-- ring + ticks -->
            <circle
              cx="0"
              cy="0"
              [attr.r]="R"
              fill="none"
              [attr.stroke]="theme.ring"
              stroke-width="2"
            />
            <ng-container
              *ngFor="let tick of [].constructor(36); let i = index"
            >
              <ng-container *ngIf="(i * 10) % 30 === 0; else minorTick2">
                <line
                  [attr.x1]="angleToPoint(R - 10, i * 10).x"
                  [attr.y1]="angleToPoint(R - 10, i * 10).y"
                  [attr.x2]="angleToPoint(R, i * 10).x"
                  [attr.y2]="angleToPoint(R, i * 10).y"
                  [attr.stroke]="theme.tickMajor"
                  stroke-width="2"
                />
              </ng-container>
              <ng-template #minorTick2>
                <line
                  [attr.x1]="angleToPoint(R - 6, i * 10).x"
                  [attr.y1]="angleToPoint(R - 6, i * 10).y"
                  [attr.x2]="angleToPoint(R, i * 10).x"
                  [attr.y2]="angleToPoint(R, i * 10).y"
                  [attr.stroke]="theme.tickMinor"
                  stroke-width="1"
                />
              </ng-template>
            </ng-container>

            <!-- arms + wings -->
            <ng-container *ngFor="let unit of units">
              <g>
                <g
                  [attr.transform]="
                    'rotate(' + ((currentTheta + unit.offset + 360) % 360) + ')'
                  "
                >
                  <line
                    x1="0"
                    y1="0"
                    x2="0"
                    [attr.y2]="-ARM_LEN"
                    [attr.stroke]="theme.arm"
                    stroke-width="5"
                    stroke-linecap="round"
                  />
                  <circle
                    *ngIf="unit.id === 0"
                    cx="0"
                    cy="0"
                    r="7"
                    [attr.fill]="theme.hub"
                  />
                  <circle
                    cx="0"
                    [attr.cy]="-ARM_LEN"
                    r="5"
                    [attr.fill]="theme.tip"
                  />
                </g>
                <g
                  [attr.transform]="
                    'translate(' +
                    angleToPoint(
                      ARM_LEN,
                      (currentTheta + unit.offset + 360) % 360
                    ).x +
                    ', ' +
                    angleToPoint(
                      ARM_LEN,
                      (currentTheta + unit.offset + 360) % 360
                    ).y +
                    ') rotate(' +
                    calculateWingAngle(
                      (currentTheta + unit.offset + 360) % 360
                    ) +
                    ')'
                  "
                >
                  <line
                    x1="0"
                    y1="0"
                    x2="0"
                    [attr.y2]="-WING_LEN"
                    [attr.stroke]="theme.wing"
                    stroke-width="8"
                    stroke-linecap="round"
                  />
                </g>
              </g>
            </ng-container>
          </g>
        </g>
      </svg>
    </div>
  </div>
</section>
