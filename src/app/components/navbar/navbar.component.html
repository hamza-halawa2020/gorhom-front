<!-- Navigation (Bootstrap 5) -->
<nav
  class="navbar navbar-expand-md navbar-dark bg-dark fixed-top border-bottom"
>
  <div class="container">
    <!-- Brand -->
    <a
      class="navbar-brand d-flex align-items-center"
      [routerLink]="['/', currentLang]"
    >
      <img
        src="../../assets/img/logo.png"
        alt="Logo"
        height="40"
        class="me-2"
      />
      <div class="fw-bold text-white">
        HPS <small class="text-info">AVIATION</small>
      </div>
    </a>

    <!-- Toggler/collapsible button -->
    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleMobileMenu()"
      aria-controls="navbarCollapse"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar links -->
    <div
      class="collapse navbar-collapse"
      [ngClass]="{ show: isMobileMenuOpen }"
      id="navbarCollapse"
    >
      <ul class="navbar-nav me-auto mb-2 mb-md-0">
        <li class="nav-item">
          <a
            class="nav-link text-light"
            [routerLink]="['/', currentLang]"
            fragment="vision"
            (click)="navigateToSection('vision', $event)"
            >{{ "nav_vision" | translate }}</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link text-light"
            [routerLink]="['/', currentLang]"
            fragment="innovation"
            (click)="navigateToSection('innovation', $event)"
            >{{ "nav_innovation" | translate }}</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link text-light"
            [routerLink]="['/', currentLang]"
            fragment="crow"
            (click)="navigateToSection('crow', $event)"
            >{{ "nav_crow_aircraft" | translate }}</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link text-light"
            [routerLink]="['/', currentLang]"
            fragment="contact"
            (click)="navigateToSection('contact', $event)"
            >{{ "nav_connect" | translate }}</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link text-light"
            [routerLink]="['/', currentLang, 'products']"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            >{{ "products" | translate }}</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link text-light"
            [routerLink]="['/', currentLang, 'blog']"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            >{{ "blog" | translate }}</a
          >
        </li>
      </ul>

      <!-- Action buttons + Language selector -->
      <div class="d-flex align-items-center">
        <a
          href="https://portal.hpsaviation.net/investor-form/new"
          class="btn btn-outline-info me-2 d-none d-md-inline-block"
        >
          {{ "nav_invest" | translate }}
        </a>
        <a
          href="https://portal.hpsaviation.net/#login"
          class="btn btn-outline-info d-none d-md-inline-block"
        >
          {{ "investor_portal" | translate }}
        </a>

        <!-- Language selector -->
        <select
          class="form-select form-select-sm ms-3"
          [(ngModel)]="currentLang"
          (change)="changeLanguage(currentLang)"
        >
          <option value="en">English</option>
          <option value="ar">العربية</option>
        </select>
      </div>
    </div>
  </div>
</nav>
