<app-loading-car [loading]="isLoading"></app-loading-car>
<div [class.hidden]="isLoading">

<app-navbar></app-navbar>

<div class="page-content">
  <section class="p-6 md:p-12 gradient-bg">
  <div class="max-w-6xl mx-auto tech-card p-6 rounded-md">
    <button class="border-glow px-4 py-2 mb-4" (click)="back()">← Back</button>

    <ng-container *ngIf="product">
      <div class="text-3xl text-glow font-bold">{{ product.name }}</div>
      <div class="text-sm text-gray-400 mb-4">{{ product.price }}</div>

      <div *ngIf="product.images?.length" class="mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
        <img *ngFor="let src of product.images" [src]="src" alt="{{product.name}}" style="width:100%;border-radius:8px;" />
      </div>

      <div class="prose text-gray-100 whitespace-pre-line">{{ product.description }}</div>
    </ng-container>
  </div>
</section>
  <app-footer></app-footer>
</div>
