<app-navbar></app-navbar>

<div class="page-content">
  <!-- LOGIN -->
  <div id="loginScreen" class="screen">
    <div class="auth-shell">
      <div>
        <div class="auth-logo"><span>HPS</span> AVIATION</div>
        <div class="auth-title">Sign in</div>
        <div class="auth-sub">
          Demo login – any email &amp; password will sign in.
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="loginPassword" type="password" />
      </div>

      <div class="form-group">
        <label>Demo account status</label>
        <select id="loginStatusSelect">
          <option value="RED">RED – Inactive (pending payment)</option>
          <option value="YELLOW">YELLOW – Pending (KYC / review)</option>
          <option value="GREEN">GREEN – Active investor</option>
        </select>
        <div class="hint">
          This selector is for demo only so you can see how the interface reacts
          to different statuses.
        </div>
      </div>

      <div class="auth-footer">
        <button class="btn-primary" id="btnLogin">Sign in</button>
        <button class="btn-ghost" id="goToRegisterFromLogin">
          New investor? Register
        </button>
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
